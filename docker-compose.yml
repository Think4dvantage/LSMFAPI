services:
  lsmfapi:
    build: .
    restart: unless-stopped
    volumes:
      - ./config.yml:/app/config.yml:ro
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
