services:
  lsmfapi:
    build: .
    restart: unless-stopped
    volumes:
      - ./config.yml:/app/config.yml:ro
      - ./data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.lsmfapi.rule=Host(`lsmfapi.lg4.ch`)"
      - "traefik.http.routers.lsmfapi.entrypoints=websecure"
      - "traefik.http.routers.lsmfapi.tls=true"
      - "traefik.http.routers.lsmfapi.tls.certresolver=letsencrypt"
      - "traefik.http.services.lsmfapi.loadbalancer.server.port=8000"
      - "traefik.docker.network=proxy"

networks:
  proxy:
    external: true
