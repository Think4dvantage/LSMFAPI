services:
  lsmfapi:
    image: ghcr.io/think4dvantage/lsmfapi:latest
    restart: unless-stopped
    volumes:
      - ./config.yml:/app/config.yml:ro
      - ./data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 2
      start_period: 10s
    networks:
      - proxy

networks:
  proxy:
    external: true
